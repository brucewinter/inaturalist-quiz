<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iNaturalist Quiz – brucewinter</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2e1a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1a0f;
      --surface: #1a2e1a;
      --surface2: #223322;
      --border: #2e4a2e;
      --green: #4caf50;
      --green-dim: #2e7d32;
      --red: #ef5350;
      --red-dim: #b71c1c;
      --text: #e8f5e9;
      --muted: #81a881;
      --accent: #76c442;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 span { font-size: 1.3rem; }

    #score-display {
      font-size: 0.9rem;
      color: var(--muted);
    }

    #score-display strong { color: var(--text); }

    main {
      width: 100%;
      max-width: 680px;
      padding: 32px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Loading */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { color: var(--muted); font-size: 0.95rem; }

    /* Quiz card */
    #quiz-card {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .question-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      align-self: flex-start;
    }

    .photo-container {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-meta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      gap: 12px;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.4;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      line-height: 1.35;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .option-btn:hover:not(:disabled) {
      background: var(--surface2);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.correct {
      background: var(--green-dim);
      border-color: var(--green);
      color: #fff;
    }

    .option-btn.wrong {
      background: var(--red-dim);
      border-color: var(--red);
      color: #fff;
    }

    .option-btn .sci-name {
      display: block;
      font-size: 0.78rem;
      opacity: 0.7;
      font-style: italic;
      margin-top: 3px;
    }

    /* Result panel */
    #result-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    #result-icon { font-size: 2rem; }

    #result-text {
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
    }

    #result-detail {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    #result-detail a {
      color: var(--accent);
      text-decoration: none;
    }

    #result-detail a:hover { text-decoration: underline; }

    /* Comparison cards (wrong answer) */
    .comparison {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .comp-card {
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid var(--border);
      font-size: 0.82rem;
    }

    .comp-card.wrong  { border-color: var(--red); }
    .comp-card.right  { border-color: var(--green); }

    .comp-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .comp-info { padding: 8px 10px; line-height: 1.4; }

    .comp-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .comp-card.wrong .comp-label { color: var(--red); }
    .comp-card.right .comp-label { color: var(--green); }

    .comp-common { font-weight: 600; }
    .comp-sci { font-style: italic; opacity: 0.65; font-size: 0.76rem; }

    #next-btn {
      background: var(--accent);
      color: #0f1a0f;
      border: none;
      border-radius: 10px;
      padding: 13px 36px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    #next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* End screen */
    #end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 40px 0;
    }

    #end-screen h2 { font-size: 1.8rem; }
    #end-screen .final-score { font-size: 3rem; font-weight: 800; color: var(--accent); }
    #end-screen p { color: var(--muted); }

    #restart-btn {
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart-btn:hover { background: var(--surface2); }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mode-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .options-grid { grid-template-columns: 1fr; }
      .question-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1><span>🌿</span> iNaturalist Quiz</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-common" onclick="setMode('common')">Common</button>
      <button class="mode-btn" id="mode-scientific" onclick="setMode('scientific')">Scientific</button>
    </div>
    <div id="score-display">Score: <strong id="score">0</strong> / <strong id="total-q">0</strong></div>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Loading your observations…</p>
  </div>

  <div id="quiz-card">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="question-label" id="question-label">Question 1</div>

    <div id="result-panel">
      <div id="result-icon"></div>
      <div id="result-text"></div>
      <div id="comparison"></div>
      <div id="result-detail"></div>
      <button id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>

    <div class="photo-container">
      <img id="obs-photo" src="" alt="Observation photo">
      <div class="photo-meta">
        <span id="obs-date"></span>
        <span id="obs-place"></span>
      </div>
    </div>

    <div class="question-text" id="question-text">What is this organism?</div>

    <div class="options-grid" id="options-grid"></div>
  </div>

  <div id="end-screen">
    <div style="font-size:3rem;">🎉</div>
    <h2>Quiz Complete!</h2>
    <div class="final-score" id="final-score"></div>
    <p id="final-msg"></p>
    <button id="restart-btn" onclick="restartQuiz()">Play Again</button>
  </div>
</main>

<script>
  const USER = 'brucewinter';
  const QUIZ_LENGTH = 5;
  const BASE = 'https://api.inaturalist.org/v1/observations';

  let allObs = [];
  let quizObs = [];
  let currentIdx = 0;
  let score = 0;
  let answered = false;
  let quizMode = 'common'; // 'common' or 'scientific'

  function setMode(mode) {
    quizMode = mode;
    document.getElementById('mode-common').classList.toggle('active', mode === 'common');
    document.getElementById('mode-scientific').classList.toggle('active', mode === 'scientific');
  }

  function getName(obs) {
    if (quizMode === 'scientific') return obs.taxon.name;
    return obs.taxon.preferred_common_name || obs.taxon.name;
  }

  function getPhotoUrl(obs) {
    return obs.photos[0].url.replace('/square.', '/medium.');
  }

  async function fetchPage(page) {
    const url = `${BASE}?user_login=${USER}&verifiable=any&per_page=200&page=${page}&order_by=id`;
    const res = await fetch(url);
    const data = await res.json();
    return data;
  }

  async function loadObservations() {
    const msg = document.getElementById('loading-msg');
    msg.textContent = 'Fetching page 1…';
    const first = await fetchPage(1);
    const total = first.total_results;
    const pages = Math.ceil(total / 200);
    let obs = first.results;

    for (let p = 2; p <= pages; p++) {
      msg.textContent = `Fetching page ${p} of ${pages}…`;
      const data = await fetchPage(p);
      obs = obs.concat(data.results);
    }

    // Filter: must have photo and taxon with a name
    allObs = obs.filter(o =>
      o.photos && o.photos.length > 0 &&
      o.taxon &&
      o.taxon.name &&
      (o.taxon.preferred_common_name || o.taxon.name)
    );

    // Deduplicate by taxon so options are distinct
    // (keep all for correct answer pool, but options will be distinct names)
    msg.textContent = `Loaded ${allObs.length} observations. Starting quiz…`;
    setTimeout(startQuiz, 600);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startQuiz() {
    score = 0;
    currentIdx = 0;
    // Pick QUIZ_LENGTH random obs (unique taxon names preferred)
    const pool = shuffle([...allObs]);
    const seen = new Set();
    quizObs = [];
    for (const o of pool) {
      const name = getName(o);
      if (!seen.has(name)) {
        seen.add(name);
        quizObs.push(o);
      }
      if (quizObs.length >= QUIZ_LENGTH) break;
    }
    // Fallback if not enough unique taxa
    if (quizObs.length < QUIZ_LENGTH) {
      quizObs = shuffle([...allObs]).slice(0, QUIZ_LENGTH);
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'flex';
    updateScoreDisplay();
    showQuestion();
  }

  function updateScoreDisplay() {
    document.getElementById('score').textContent = score;
    document.getElementById('total-q').textContent = currentIdx;
  }

  function showQuestion() {
    if (currentIdx >= quizObs.length) { endQuiz(); return; }

    answered = false;
    const obs = quizObs[currentIdx];
    const correctName = getName(obs);
    const correctSci = obs.taxon.name;

    // Progress
    document.getElementById('progress-fill').style.width = `${(currentIdx / quizObs.length) * 100}%`;
    document.getElementById('question-label').textContent = `Question ${currentIdx + 1} of ${quizObs.length}`;

    // Photo
    document.getElementById('obs-photo').src = getPhotoUrl(obs);
    document.getElementById('obs-date').textContent = obs.observed_on || '';
    document.getElementById('obs-place').textContent = obs.place_guess || '';

    // Question text
    const qText = quizMode === 'scientific'
      ? 'What is the scientific name of this organism?'
      : 'What is this organism?';
    document.getElementById('question-text').textContent = qText;

    // Generate 3 distractors: prefer same genus, then same iconic taxon, then anything
    const correctGenus = correctSci.split(' ')[0];
    const correctIconic = obs.taxon.iconic_taxon_name || '';
    const seen = new Set([correctName]);
    const distractors = [];

    const pools = [
      shuffle(allObs.filter(o => o.taxon.name.split(' ')[0] === correctGenus && getName(o) !== correctName)),
      shuffle(allObs.filter(o => (o.taxon.iconic_taxon_name || '') === correctIconic && o.taxon.name.split(' ')[0] !== correctGenus && getName(o) !== correctName)),
      shuffle(allObs.filter(o => (o.taxon.iconic_taxon_name || '') !== correctIconic && getName(o) !== correctName)),
    ];
    for (const pool of pools) {
      for (const d of pool) {
        const n = getName(d);
        if (!seen.has(n)) { seen.add(n); distractors.push(d); }
        if (distractors.length >= 3) break;
      }
      if (distractors.length >= 3) break;
    }

    const options = shuffle([obs, ...distractors]);
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      const displayName = getName(opt);
      const sciName = opt.taxon.name;
      btn.innerHTML = displayName + (quizMode === 'common' && sciName !== displayName
        ? `<span class="sci-name">${sciName}</span>` : '');
      btn.dataset.name = displayName;
      btn.addEventListener('click', () => handleAnswer(btn, opt, obs));
      grid.appendChild(btn);
    });

    // Hide result panel
    document.getElementById('result-panel').style.display = 'none';
    updateScoreDisplay();
  }

  function handleAnswer(clickedBtn, guessedObs, correctObs) {
    if (answered) return;
    answered = true;

    const chosen = getName(guessedObs);
    const correct = getName(correctObs);
    const isCorrect = chosen === correct;
    if (isCorrect) score++;

    // Style all buttons
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.name === correct) btn.classList.add('correct');
      else if (btn === clickedBtn && !isCorrect) btn.classList.add('wrong');
    });

    // Result panel
    const panel = document.getElementById('result-panel');
    panel.style.display = 'flex';
    document.getElementById('result-icon').textContent = isCorrect ? '✅' : '❌';
    document.getElementById('result-text').textContent = isCorrect ? 'Correct!' : 'Not quite!';

    // Comparison (wrong answers only)
    const cmp = document.getElementById('comparison');
    if (!isCorrect) {
      const compCard = (obs, cls, label) => `
        <div class="comp-card ${cls}">
          <img src="${getPhotoUrl(obs)}" alt="">
          <div class="comp-info">
            <div class="comp-label">${label}</div>
            <div class="comp-common">${getName(obs)}</div>
            <div class="comp-sci">${obs.taxon.name}</div>
          </div>
        </div>`;
      cmp.innerHTML = `<div class="comparison">
        ${compCard(guessedObs, 'wrong', 'Your guess')}
        ${compCard(correctObs, 'right', 'Correct answer')}
      </div>`;
    } else {
      cmp.innerHTML = '';
    }

    const wikiUrl = correctObs.taxon.wikipedia_url || `https://en.wikipedia.org/wiki/${correctObs.taxon.name.replace(/ /g, '_')}`;
    document.getElementById('result-detail').innerHTML =
      `<a href="${wikiUrl}" target="_blank">Wikipedia</a> · <a href="https://www.inaturalist.org/observations/${correctObs.id}" target="_blank">iNaturalist →</a>`;

    updateScoreDisplay();
  }

  function nextQuestion() {
    currentIdx++;
    showQuestion();
  }

  function endQuiz() {
    document.getElementById('quiz-card').style.display = 'none';
    const end = document.getElementById('end-screen');
    end.style.display = 'flex';
    const pct = Math.round((score / quizObs.length) * 100);
    document.getElementById('final-score').textContent = `${score} / ${quizObs.length}`;
    const msgs = [
      [90, '🏆 Excellent! You really know your species!'],
      [70, '🌟 Great job — solid naturalist skills!'],
      [50, '🌱 Good effort — keep observing!'],
      [0,  '🔍 Keep exploring — practice makes perfect!'],
    ];
    document.getElementById('final-msg').textContent = msgs.find(([t]) => pct >= t)[1];
  }

  function restartQuiz() {
    startQuiz();
  }

  // Kick off
  loadObservations();
</script>
</body>
</html>
